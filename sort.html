<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #1c0a0e;
  color: #fff;
  padding: 20px;
  max-width: 900px; margin: 0 auto;
}
h1 { font-size: 1.2em; font-weight: 300; text-align: center; margin-bottom: 5px; color: #f9a8d4; letter-spacing: 2px; }
h2 { font-size: 0.85em; font-weight: 300; text-align: center; margin-bottom: 20px; color: rgba(255,255,255,0.3); }
h3 { font-size: 0.8em; font-weight: 400; color: rgba(255,255,255,0.4); margin: 20px 0 10px; letter-spacing: 1px; }
.section { background: rgba(255,255,255,0.02); border: 1px solid rgba(249,168,212,0.06); border-radius: 12px; padding: 16px; margin-bottom: 20px; }

/* TIMELINE */
.timeline { list-style: none; }
.timeline-item {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.2s;
  cursor: default;
}
.timeline-item:hover { background: rgba(249,168,212,0.03); }
.timeline-item .pos {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(249,168,212,0.08);
  color: rgba(249,168,212,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7em; flex-shrink: 0;
}
.timeline-item .thumb {
  width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
}
.timeline-item .info { flex: 1; min-width: 0; }
.timeline-item .info .label { font-size: 0.75em; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-item .info .desc { font-size: 0.65em; color: rgba(255,255,255,0.25); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-item .date-badge {
  font-size: 0.6em; color: rgba(249,168,212,0.3);
  background: rgba(249,168,212,0.04);
  padding: 2px 8px; border-radius: 10px; white-space: nowrap;
}
.timeline-item .file-label {
  font-size: 0.55em; color: rgba(255,255,255,0.15); white-space: nowrap;
}

/* UNSORTED POOL */
.pool {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;
}
.pool-item {
  background: rgba(255,255,255,0.02); border: 1px solid rgba(249,168,212,0.08); border-radius: 10px;
  padding: 10px; display: flex; flex-direction: column; gap: 6px;
  transition: all 0.3s;
}
.pool-item:hover { border-color: rgba(249,168,212,0.2); background: rgba(249,168,212,0.03); }
.pool-item .thumb { width: 100%; height: 120px; border-radius: 6px; object-fit: cover; }
.pool-item .label { font-size: 0.7em; color: rgba(255,255,255,0.5); }
.pool-item .desc { font-size: 0.6em; color: rgba(255,255,255,0.25); line-height: 1.4; }
.pool-item .insert-row {
  display: flex; gap: 6px; align-items: center; margin-top: 4px;
}
.pool-item .insert-row input {
  width: 60px; padding: 4px 6px; border: 1px solid rgba(249,168,212,0.15);
  border-radius: 6px; background: rgba(255,255,255,0.03); color: #fff;
  font-size: 0.7em; font-family: inherit; text-align: center;
}
.pool-item .insert-row button {
  flex: 1; padding: 4px 8px; border: none; border-radius: 6px;
  background: rgba(249,168,212,0.1); color: #f9a8d4;
  font-size: 0.65em; cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.pool-item .insert-row button:hover { background: rgba(249,168,212,0.2); }
.pool-item.inserted { opacity: 0.3; pointer-events: none; }

/* BUTTONS */
.btn-row { text-align: center; margin: 20px 0; }
.btn-confirm {
  padding: 12px 40px; border: 1px solid rgba(249,168,212,0.2);
  border-radius: 50px; background: rgba(249,168,212,0.06);
  color: #f9a8d4; font-size: 0.85em; cursor: pointer;
  font-family: inherit; transition: all 0.3s; letter-spacing: 1px;
}
.btn-confirm:hover { background: rgba(249,168,212,0.12); border-color: rgba(249,168,212,0.4); }

/* OUTPUT */
.output-box {
  display: none; margin-top: 20px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(249,168,212,0.1);
  border-radius: 12px; padding: 16px;
}
.output-box.show { display: block; }
.output-box pre {
  font-size: 0.6em; color: rgba(255,255,255,0.5);
  white-space: pre-wrap; word-break: break-all;
  font-family: 'Courier New', monospace;
  max-height: 300px; overflow-y: auto;
  background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;
  line-height: 1.6;
}
.output-box .hint { font-size: 0.7em; color: rgba(255,255,255,0.3); margin-bottom: 8px; }

/* Empty state */
.empty-hint { font-size: 0.7em; color: rgba(255,255,255,0.15); text-align: center; padding: 20px; }

// Current timeline (dated photos sorted chronologically)
let timeline = [...NEW_PHOTOS].sort((a, b) => a.date.localeCompare(b.date));
let undatedPool = [...UNDATED];

function render() {
  renderTimeline();
  renderUnsorted();
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = timeline.map((p, i) => `
    <div class="timeline-item">
      <span class="pos">${i + 1}</span>
      <img class="thumb" src="photos/${p.file}" alt="">
      <div class="info">
        <div class="label">${p.emoji} ${p.type === 'old' ? '旧照' + p.num : '#' + p.num} · ${trunc(p.text, 30)}</div>
        <div class="desc">${p.text}</div>
      </div>
      <span class="date-badge">${p.date || '待定'}</span>
      <span class="file-label">${p.file}</span>
    </div>
  `).join('');
}

function renderUnsorted() {
  const el = document.getElementById('unsortedPool');
  const empty = document.getElementById('emptyPool');
  if (undatedPool.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  el.innerHTML = undatedPool.map((p, i) => `
    <div class="pool-item" id="pool-${i}">
      <img class="thumb" src="photos/${p.file}" alt="">
      <div class="label">${p.emoji} ${p.type === 'old' ? '旧照' + p.num : '#' + p.num} · ${p.file}</div>
      <div class="desc">${trunc(p.text, 60)}</div>
      <div class="insert-row">
        <input type="number" id="posInput-${i}" min="1" max="${timeline.length + 1}" value="${Math.min(i + 1, timeline.length + 1)}" placeholder="位置">
        <button onclick="insertPhoto(${i})">插入</button>
      </div>
    </div>
  `).join('');
}

function trunc(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

function insertPhoto(idx) {
  const input = document.getElementById('posInput-' + idx);
  let pos = parseInt(input.value);
  if (isNaN(pos) || pos < 1) pos = 1;
  if (pos > timeline.length + 1) pos = timeline.length + 1;
  
  const photo = undatedPool.splice(idx, 1)[0];
  timeline.splice(pos - 1, 0, photo);
  render();
}

function confirmOrder() {
  if (undatedPool.length > 0) {
    if (!confirm('还有 ' + undatedPool.length + ' 张照片没插入，确定要确认吗？')) return;
  }
  
  const output = timeline.map((p, i) => {
    return `  { pos: ${i + 1}, file: '${p.file}', emoji: '${p.emoji}', text: '${p.text.replace(/'/g, "\\'")}' }`;
  }).join(',\n');
  
  document.getElementById('outputContent').textContent = '[\n' + output + '\n]';
  document.getElementById('outputBox').classList.add('show');
  document.getElementById('outputBox').scrollIntoView({ behavior: 'smooth' });
}

// Init
render();
</script>
</body>
</html>
